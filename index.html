    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        :root {
            --glow-idle:      radial-gradient(ellipse at 50% 120%, rgba(170,110,30,0.18) 0%, transparent 65%);
            --glow-listening: radial-gradient(ellipse at 50% 110%, rgba(210,140,40,0.38) 0%, transparent 65%);
            --glow-speaking:  radial-gradient(ellipse at 50% 120%, rgba(70,120,200,0.22) 0%, transparent 65%);
            --glow-processing:radial-gradient(ellipse at 50% 120%, rgba(120,90,170,0.18) 0%, transparent 65%);
            --text-primary:   rgba(225, 205, 175, 0.92);
            --text-secondary: rgba(185, 160, 125, 0.65);
            --text-dim:       rgba(140, 118, 88,  0.40);
            --border-subtle:  rgba(180, 140, 70,  0.18);
        }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden;
            background: #080808;
            font-family: 'Lora', Georgia, serif;
            color: var(--text-primary);
        }

        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            position: relative;
        }

        /* ── Glow ── */
        #glow {
            position: fixed;
            inset: 0;
            background: var(--glow-idle);
            transition: background 1.4s ease;
            pointer-events: none;
            z-index: 0;
        }
        #glow.listening  { background: var(--glow-listening); }
        #glow.speaking   { background: var(--glow-speaking); }
        #glow.processing { background: var(--glow-processing); }

        /* ── Shen 神 (abstracted) ── */
        #shen {
            position: fixed;
            bottom: -8%;
            left: 50%;
            transform: translateX(-50%);
            width: min(55vw, 260px);
            height: auto;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout ── */
        #app {
            position: relative; z-index: 1;
            width: 100%; max-width: 380px;
            padding: 2.5rem 2rem;
            display: flex; flex-direction: column;
            align-items: center; gap: 0;
            text-align: center;
        }

        /* ── Login ── */
        #login-screen {
            display: flex; flex-direction: column;
            align-items: center; gap: 1.6rem; width: 100%;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.9rem; font-weight: 300;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--text-primary);
        }
        .wordmark-sub {
            font-family: 'Lora', serif; font-style: italic;
            font-size: 0.78rem; letter-spacing: 0.12em;
            color: var(--text-dim); margin-top: 0.4rem;
        }

        .field {
            width: 100%; position: relative;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 0.85rem 1.1rem;
            font-family: 'Lora', serif; font-size: 0.88rem;
            border-radius: 3px; outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        .field input:focus { border-color: rgba(180,140,70,0.45); }
        .field input::placeholder { color: var(--text-dim); }

        .btn-enter {
            width: 100%;
            padding: 0.85rem;
            background: rgba(170,110,30,0.12);
            border: 1px solid rgba(170,110,30,0.28);
            color: var(--text-primary);
            font-family: 'Lora', serif; font-size: 0.82rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            border-radius: 3px; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-enter:active { background: rgba(170,110,30,0.22); }

        .login-error {
            font-size: 0.75rem; color: rgba(200,80,70,0.75);
            min-height: 1rem; text-align: center;
        }

        /* ── Main Screen ── */
        #main-screen {
            display: none; flex-direction: column;
            align-items: center; gap: 0; width: 100%;
        }

        .label-state {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.72rem; letter-spacing: 0.35em;
            text-transform: uppercase; color: var(--text-dim);
            min-height: 1.1rem; margin-bottom: 2.5rem;
            transition: opacity 0.4s;
        }

        .display-practice {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.22rem; font-weight: 300; font-style: italic;
            line-height: 1.85; color: var(--text-primary);
            min-height: 5rem; max-width: 300px;
            margin-bottom: 1.8rem;
            transition: opacity 0.7s;
        }

        .display-question {
            font-family: 'Lora', serif; font-style: italic;
            font-size: 0.94rem; line-height: 1.72;
            color: var(--text-secondary);
            min-height: 3.5rem; max-width: 290px;
            margin-bottom: 2.8rem;
            transition: opacity 0.5s;
        }

        /* ── Mic Button ── */
        #mic-btn {
            width: 68px; height: 68px; border-radius: 50%;
            background: rgba(170,110,30,0.09);
            border: 1px solid rgba(170,110,30,0.22);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.35s;
            margin-bottom: 1.4rem;
            -webkit-tap-highlight-color: transparent;
        }
        #mic-btn.recording {
            background: rgba(200,90,30,0.18);
            border-color: rgba(210,110,40,0.5);
            box-shadow: 0 0 28px rgba(200,90,30,0.12);
        }
        #mic-btn svg {
            width: 26px; height: 26px;
            fill: var(--text-secondary); transition: fill 0.3s;
        }
        #mic-btn.recording svg { fill: rgba(230,140,60,0.9); }

        .label-hint {
            font-size: 0.68rem; color: var(--text-dim);
            letter-spacing: 0.18em; text-align: center;
            min-height: 1rem; margin-bottom: 0.5rem;
        }

        .label-error {
            font-size: 0.74rem; color: rgba(200,80,70,0.7);
            text-align: center; min-height: 1rem;
            max-width: 280px;
        }

        /* ── Logout ── */
        #logout-btn {
            position: fixed; top: 1.4rem; right: 1.4rem;
            font-family: 'Lora', serif; font-size: 0.62rem;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--text-dim); background: none; border: none;
            cursor: pointer; z-index: 10; display: none;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s ease forwards; }

        /* ── Recording pulse ── */
        @keyframes recordPulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }
        #mic-btn.recording { animation: recordPulse 2s ease-in-out infinite; }
    </style>
</head>

async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!email || !pwd) { errEl.textContent = 'Email and password required.'; return; }
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { errEl.textContent = error.message; return; }
    S.user = data.user;
    showMain();
}

async function handleLogout() {
    await sb.auth.signOut();
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display  = 'none';
    document.getElementById('logout-btn').style.display   = 'none';
    resetState();
}

async function initAuth() {
    // Detect password recovery or invite token in URL hash (best practice pattern)
    const params = new URLSearchParams(window.location.hash.replace('#', '?'));
    const type = params.get('type');
    if (type === 'recovery' || type === 'invite') {
        const { data: { session } } = await sb.auth.getSession();
        if (session) { showSetPassword(); return; }
    }
    // Normal session check
    const { data: { session } } = await sb.auth.getSession();
    if (session) { S.user = session.user; showMain(); }
}

async function showSetPassword() {
    document.getElementById('login-screen').style.display   = 'none';
    document.getElementById('set-pwd-screen').style.display = 'flex';
}

async function handleSetPassword() {
    const pwd     = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const errEl   = document.getElementById('set-pwd-error');
    errEl.textContent = '';
    if (pwd.length < 8)  { errEl.textContent = 'Password must be at least 8 characters.'; return; }
    if (pwd !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }
    const { data, error } = await sb.auth.updateUser({ password: pwd });
    if (error) { errEl.textContent = error.message; return; }
    S.user = data.user;
    window.history.replaceState(null, '', window.location.pathname);
    document.getElementById('set-pwd-screen').style.display = 'none';
    showMain();
}

// ════════════════════════════════════════════════════════
// AUDIO RECORDING
// ════════════════════════════════════════════════════════
async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        S.audioChunks = [];
        let mimeType = '';
        for (const t of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']) {
            if (MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
        }
        S.recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        S.recorder.ondataavailable = (e) => { if (e.data.size > 0) S.audioChunks.push(e.data); };
        S.recorder.start(100);
        $mic.classList.add('recording');
        setGlow('listening');
        return true;
    } catch {
        showError('Microphone access is required. Please allow and try again.');
        return false;
    }
}

function stopRecording() {
    return new Promise((resolve) => {
        if (!S.recorder || S.recorder.state === 'inactive') { resolve(null); return; }
        S.recorder.onstop = () => {
            const type = S.recorder.mimeType || 'audio/webm';
            const blob = new Blob(S.audioChunks, { type });
            S.recorder.stream.getTracks().forEach(t => t.stop());
            $mic.classList.remove('recording');
            setGlow('idle');
            resolve(blob);
        };
        S.recorder.stop();
    });
}

// ════════════════════════════════════════════════════════
// SPEECH RECOGNITION — for "next" keyword detection
// ════════════════════════════════════════════════════════
function startRecognition(onNext) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = 'en-US';
    r.onresult = (ev) => {
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
            const t = ev.results[i][0].transcript.toLowerCase().trim();
            if (t === 'next' || t.endsWith(' next') || t.endsWith('.next') || t === 'next.') {
                onNext(); return;
            }
        }
    };
    r.onerror = () => {};
    try { r.start(); S.recognition = r; } catch {}
}

function stopRecognition() {
    if (S.recognition) { try { S.recognition.stop(); } catch {} S.recognition = null; }
}

// ════════════════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════════════════
async function speak(text) {
    const clean = text.replace(/\n/g, ' ').trim();
    if (!clean) return;

    setGlow('speaking'); S.speaking = true;

    try {
        const res = await fetch('/.netlify/functions/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: clean })
        });

        if (!res.ok) throw new Error('TTS failed');

        const { audioBase64 } = await res.json();

        await new Promise((resolve) => {
            const audioBlob = base64ToBlob(audioBase64, 'audio/mpeg');
            const audioUrl  = URL.createObjectURL(audioBlob);
            const audio     = new Audio(audioUrl);
            audio.onended = audio.onerror = () => {
                URL.revokeObjectURL(audioUrl);
                setGlow('idle'); S.speaking = false;
                resolve();
            };
            audio.play().catch(() => { setGlow('idle'); S.speaking = false; resolve(); });
        });

    } catch (err) {
        // Temporary: surface error so we can diagnose
        showError('TTS error: ' + (err && err.message ? err.message : String(err)));
        await fallbackSpeak(clean);
        setGlow('idle'); S.speaking = false;
    }
}

function fallbackSpeak(text) {
    return new Promise((resolve) => {
        if (!window.speechSynthesis) { resolve(); return; }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.82; u.pitch = 0.92; u.volume = 0.95;
        const voices = window.speechSynthesis.getVoices();
        const pick = voices.find(v =>
            ['Samantha','Karen','Moira','Tessa'].some(n => v.name.includes(n))
        ) || voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB');
        if (pick) u.voice = pick;
        u.onend = u.onerror = resolve;
        window.speechSynthesis.speak(u);
    });
}

function base64ToBlob(base64, mimeType) {
    const bytes  = atob(base64);
    const buffer = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) buffer[i] = bytes.charCodeAt(i);
    return new Blob([buffer], { type: mimeType });
}

// ════════════════════════════════════════════════════════
// WHISPER
// ════════════════════════════════════════════════════════
async function transcribe(blob) {
    setLabel('processing...');

    // File size gate: Netlify function body limit ~6MB, base64 adds ~33% overhead
    const MAX_BYTES = 4 * 1024 * 1024; // 4MB raw limit
    if (blob.size > MAX_BYTES) {
        showError('Recording too long. Please keep answers under a few minutes.');
        return null;
    }

    let fname = 'audio.webm';
    if (blob.type.includes('mp4')) fname = 'audio.mp4';
    if (blob.type.includes('ogg')) fname = 'audio.ogg';

    try {
        const audioBase64 = await blobToBase64(blob);
        const res = await fetch('/.netlify/functions/whisper', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audioBase64, filename: fname })
        });
        if (res.status === 401) { showError('Whisper API key error. Check Netlify environment variables.'); return null; }
        if (!res.ok) throw new Error(await res.text());
        const d = await res.json();
        let t = (d.text || '').trim();
        t = t.replace(/[,.]?\s*\bnext\b\s*\.?\s*$/i, '').trim();
        return t;
    } catch {
        showError('Transcription failed. Please try again.');
        return null;
    }
}

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}

// ════════════════════════════════════════════════════════
// CLAUDE
// ════════════════════════════════════════════════════════
async function claude(messages, system, _attempt = 0) {
    const MAX_RETRIES = 6;
    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages, system: system || SYSTEM_PROMPT })
        });

        // 529/503 — overloaded, retry with exponential backoff
        if ((res.status === 529 || res.status === 503) && _attempt < MAX_RETRIES) {
            const waitMs  = Math.min(Math.pow(2, _attempt) * 1000, 30000);
            const waitSec = Math.round(waitMs / 1000);
            setLabel(`busy — retrying in ${waitSec}s (${_attempt + 1}/${MAX_RETRIES})`);
            await sleep(waitMs);
            return claude(messages, system, _attempt + 1);
        }

        // 401 — bad key, permanent, don't retry
        if (res.status === 401) {
            showError('API key error. Check ANTHROPIC_API_KEY in Netlify environment variables.');
            return null;
        }

        // 400 — bad request, don't retry
        if (res.status === 400) {
            showError('Request error. Please try again.');
            return null;
        }

        if (!res.ok) throw new Error(await res.text());

        const data = await res.json();
        return data.content[0].text;

    } catch {
        showError('Connection failed. Please check your network and try again.');
        return null;
    }
}

async function detectThreshold(text) {
    const lower = text.toLowerCase();
    // Keyword matching first (faster, no API call needed)
    for (const [key, t] of Object.entries(THRESHOLDS)) {
        if (t.keywords.some(kw => lower.includes(kw))) return key;
    }
    // Claude fallback for ambiguous cases
    const r = await claude([{ role:'user', content:`The user said: "${text}". Which threshold? Options: morning, meal, pre_training, post_training, evening, pre_bed, weekly. Reply with ONLY the key.` }]);
    return (r && THRESHOLDS[r.trim()]) ? r.trim() : null;
}

function detectTrainingType(text) {
    const l = text.toLowerCase();
    if (l.includes('box') || l.includes('bag') || l.includes('spar')) return 'boxing';
    if (l.includes('lift') || l.includes('weight') || l.includes('strength') || l.includes('gym')) return 'lifting';
    return 'general';
}

async function getCoachingNote() {
    try {
        const { data } = await sb
            .from('logs')
            .select('summary, created_at')
            .eq('user_id', S.user.id)
            .eq('threshold_type', 'post_training')
            .order('created_at', { ascending: false })
            .limit(12);
        if (!data || !data.length) return null;
        const notes = data
            .filter(l => l.summary?.technical_notes)
            .map(l => `${l.created_at.split('T')[0]} (${l.summary.training_type || 'training'}): ${l.summary.technical_notes}`)
            .join('\n');
        if (!notes) return null;
        const r = await claude([{ role:'user', content:`Recent training notes:\n${notes}\n\nAdrian is about to do ${S.trainingType || 'training'}. Identify the single most important coaching focus. One or two sentences, speak directly to him. If nothing specific: respond exactly NONE` }]);
        return (!r || r.trim() === 'NONE') ? null : r.trim();
    } catch { return null; }
}

async function generateSummary() {
    const schema = JSON.parse(JSON.stringify(S.threshold.schema));
    if (S.threshold.id === 'meal')         schema.meal_time = S.mealTime || getMealWindow();
    if (S.threshold.id === 'pre_training') schema.training_type = S.trainingType;
    if (S.threshold.id === 'post_training') schema.training_type = S.trainingType;
    if (S.threshold.id === 'weekly')       schema.is_supplemental = new Date().getDay() !== 0;

    const conv = S.conversation.map(m =>
        `${m.role === 'user' ? 'Adrian' : 'Coach'}: ${m.content}`
    ).join('\n');

    const prompt = `Fill this JSON schema from the conversation. Extract and normalize values. Leave null for anything not discussed. Capture important context in open_notes.\n\nSchema:\n${JSON.stringify(schema,null,2)}\n\nConversation:\n${conv}\n\nReturn ONLY the completed JSON.`;

    const r = await claude([{ role:'user', content: prompt }]);
    if (!r) return null;
    try {
        return JSON.parse(r.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());
    } catch {
        return { threshold_type: S.threshold.id, open_notes: r, parse_error: true };
    }
}

// ════════════════════════════════════════════════════════
// SUPABASE STORAGE
// ════════════════════════════════════════════════════════
async function saveLog(summary) {
    const { error } = await sb.from('logs').insert({
        user_id: S.user.id,
        threshold_type: S.threshold.id,
        meal_time: S.mealTime || null,
        training_type: S.trainingType || null,
        summary,
        created_at: new Date().toISOString()
    });
    if (error) { showError('Save failed. Please try again.'); return false; }
    return true;
}

// ════════════════════════════════════════════════════════
// MAIN FLOW
// ════════════════════════════════════════════════════════
async function handleMicTap() {
    // Tap while speaking = interrupt
    if (S.speaking) {
        window.speechSynthesis.cancel();
        S.speaking = false; setGlow('idle');
        return;
    }

    if (S.phase === 'idle') {
        await beginSelection();
    } else if (S.phase === 'selecting') {
        // User taps again to stop threshold recording and process
        await processThresholdSelection();
    } else if (S.phase === 'listening') {
        // Manual stop (fallback for "next" detection failure)
        await processCurrentAnswer();
    }
}

// ── Phase 1: Threshold Selection ──
async function beginSelection() {
    S.phase = 'selecting';
    setLabel('listening');
    setPractice(''); setQuestion('');
    setHint('speak your threshold');

    // Start recording — app waits silently for user to tap again to stop
    const started = await startRecording();
    if (!started) { S.phase = 'idle'; resetUI(); return; }

    setLabel('listening...');
    setHint('tap again when done');
    // Flow continues in processThresholdSelection() when user taps mic
}

async function processThresholdSelection() {
    setLabel('processing...');
    const blob = await stopRecording();
    if (!blob) { resetState(); return; }

    const text = await transcribe(blob);
    if (!text) { resetState(); return; }

    S.trainingType = detectTrainingType(text);
    S.mealTime = getMealWindow();

    const key = await detectThreshold(text);
    if (!key) {
        await speak("I didn't catch that. Try again — morning, meal, training, evening, or bedtime.");
        resetState(); return;
    }

    S.threshold = THRESHOLDS[key];
    S.conversation = [];
    S.qIndex = 0;
    S.deepDive = false;
    S.nextTriggered = false;

    await beginPractice();
}

// ── Phase 2: Practice Text ──
async function beginPractice() {
    S.phase = 'practicing';

    let practiceText = S.threshold.practiceText;

    if (S.threshold.id === 'pre_training') {
        if (S.trainingType === 'boxing') practiceText = S.threshold.boxingText;
        else if (S.trainingType === 'lifting') practiceText = S.threshold.liftingText;
        else practiceText = S.threshold.generalText;
    }

    setLabel(S.threshold.label.toLowerCase());
    setPractice(practiceText || '');
    setQuestion('');
    setHint('');

    if (practiceText) await speak(practiceText);
    await sleep(1800);

    // Pre-bed: speak the invitation then go to questions
    if (S.threshold.id === 'pre_bed') {
        await speak(S.threshold.invitationText);
        await sleep(1500);
    }

    // Pre-training: pull coaching note from logs
    if (S.threshold.id === 'pre_training') {
        setLabel('reviewing logs...');
        const note = await getCoachingNote();
        if (note) {
            await speak(note);
            // Store the coaching note for the summary
            S.threshold.schema.coaching_note = note;
            await sleep(1000);
        }
    }

    S.questions = S.deepDive ? S.threshold.deepDiveQuestions : S.threshold.questions;
    await beginQuestioning();
}

// ── Phase 3: Questions ──
async function beginQuestioning() {
    S.phase = 'questioning';
    S.qIndex = 0;
    await askQuestion();
}

async function askQuestion() {
    if (S.qIndex >= S.questions.length) {
        // Meal: offer deep dive
        if (S.threshold.id === 'meal' && !S.deepDive && S.threshold.deepDiveQuestions) {
            await speak("Is there anything about how the meal landed you'd like to explore further? Say 'go deeper', or 'done' to finish.");
            setHint("say 'go deeper' or 'done'");
            setLabel('listening...');

            const started = await startRecording();
            if (!started) { await finish(); return; }
            await sleep(5000);
            const blob = await stopRecording();
            const t = await transcribe(blob);
            if (t && t.toLowerCase().includes('deep')) {
                S.deepDive = true;
                S.questions = S.threshold.deepDiveQuestions;
                S.qIndex = 0;
                await askQuestion(); return;
            }
        }
        await finish(); return;
    }

    const q = S.questions[S.qIndex];
    setQuestion(q);
    setLabel(`question ${S.qIndex + 1} of ${S.questions.length}`);
    setHint("say 'next' when ready");

    await speak(q);
    await sleep(600);

    await listenForAnswer();
}

// ── Answer Recording ──
async function listenForAnswer() {
    S.phase = 'listening';
    S.nextTriggered = false;

    const started = await startRecording();
    if (!started) { await processCurrentAnswer(); return; }

    setLabel('listening...');

    // Start speech recognition to detect "next"
    startRecognition(async () => {
        if (!S.nextTriggered) {
            S.nextTriggered = true;
            await processCurrentAnswer();
        }
    });

    // Safety timeout: 3 minutes max per answer
    const timeout = setTimeout(async () => {
        if (!S.nextTriggered) {
            S.nextTriggered = true;
            stopRecognition();
            await processCurrentAnswer();
        }
    }, 180000);

    // Poll for next triggered (from either speech recognition or tap)
    await new Promise(resolve => {
        const check = setInterval(() => {
            if (S.nextTriggered) {
                clearInterval(check); clearTimeout(timeout); resolve();
            }
        }, 300);
    });
}

async function processCurrentAnswer() {
    S.nextTriggered = true;
    stopRecognition();
    setLabel('processing...');
    setGlow('processing');
    $mic.classList.remove('recording');

    const blob = await stopRecording();
    if (blob) {
        const text = await transcribe(blob);
        if (text) {
            S.conversation.push({ role: 'user', content: text, question: S.questions[S.qIndex] });
        }
    }

    S.qIndex++;
    S.phase = 'questioning';
    S.nextTriggered = false;
    await sleep(400);
    await askQuestion();
}

// ── Phase 4: Complete ──
async function finish() {
    S.phase = 'summarizing';
    setLabel('completing...');
    setPractice(''); setQuestion('');
    setHint('');

    await speak("One moment.");
    setGlow('processing');

    const summary = await generateSummary();
    if (summary) {
        const saved = await saveLog(summary);
        if (saved) {
            S.phase = 'complete';
            setGlow('idle');
            setLabel('complete');
            setPractice('✦');
            setHint('tap to begin again');
            await speak("Done. It is held.");
            setTimeout(resetState, 3500);
        } else { resetState(); }
    } else { resetState(); }
}

// ════════════════════════════════════════════════════════
// RESET
// ════════════════════════════════════════════════════════
function resetState() {
    S.phase = 'idle'; S.threshold = null; S.questions = [];
    S.qIndex = 0; S.conversation = []; S.trainingType = null;
    S.mealTime = null; S.deepDive = false; S.nextTriggered = false;
    stopRecognition();
    $mic.classList.remove('recording');
    resetUI();
}

function resetUI() {
    setLabel('ready'); setPractice(''); setQuestion('');
    setHint('tap and tell me where you are'); setGlow('idle');
}

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Pre-load voices
if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Register service worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
}

// Init
initAuth();

</script>
